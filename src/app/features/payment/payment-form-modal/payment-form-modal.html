<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>{{ paymentToEdit ? 'Editar' : 'Nuevo' }} Método de Pago</h3>
      <button class="close-btn" (click)="closeModal()">×</button>
    </div>

    <form (ngSubmit)="savePayment()" class="neon-form">
      
      <div class="form-group">
        <label>Moneda Asociada</label>
        <select [(ngModel)]="payment.coinID" name="coinID" required class="neon-input">
          @for (coin of coins; track coin.id) {
            <option [value]="coin.id" class="notranslate" translate="no">{{ coin.name }} ({{ coin.code }})</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Nombre del Método</label>
        <input type="text" [(ngModel)]="payment.name" name="name" required placeholder="Ej: Binance Pay" class="neon-input">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="payment.description" name="description" required placeholder="Breve descripción..." class="neon-input" rows="2"></textarea>
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" [(ngModel)]="payment.international" name="international" id="intl" style="width: 18px; height: 18px;">
        <label for="intl" style="margin: 0; cursor: pointer; color: white;">¿Es un método internacional?</label>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label>Imagen del Método (Opcional)</label>
        <input type="file" (change)="onFileChange($event, 'imageFile')" accept="image/*" class="neon-input">
      </div>

      <div class="form-group">
        <label>Ícono (Opcional)</label>
        <input type="file" (change)="onFileChange($event, 'iconFile')" accept="image/*" class="neon-input">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn-neon-action">Guardar Método</button>
      </div>
    </form>
  </div>
</div>
