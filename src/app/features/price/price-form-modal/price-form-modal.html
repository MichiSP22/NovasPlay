<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>{{ priceToEdit ? 'Editar' : 'Nuevo' }} Precio</h3>
      <button class="close-btn" (click)="closeModal()">
        <span class="material-icons notranslate" translate="no">close</span>
      </button>
    </div>

    <form (ngSubmit)="savePrice()" class="neon-form">
      
      <div class="form-row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label>1. Filtrar por Producto</label>
          <select [(ngModel)]="selectedProductID" name="productID" class="neon-select" (change)="onProductChange()">
            <option [ngValue]="0" disabled>Selecciona un producto</option>
            @for (prod of availableProducts; track prod.id) {
              <option [ngValue]="prod.id" class="notranslate" translate="no">{{ prod.name }}</option>
            }
          </select>
        </div>

        <div class="form-group" style="flex: 1;">
          <label>2. Recarga Asociada</label>
          <select [(ngModel)]="price.detailID" name="detailID" required class="neon-select">
            <option [ngValue]="0" disabled>Selecciona una recarga</option>
            @for (rec of filteredRecharges; track rec.id) {
              <option [ngValue]="rec.id" class="notranslate" translate="no">{{ rec.name }}</option>
            }
          </select>
        </div>
      </div>

      <hr class="neon-divider" style="margin: 1.5rem 0; border: none; border-top: 1px solid rgba(0,255,204,0.3);" />

      <h4 style="margin-bottom: 1rem; color: #00d4ff;">Datos de Cobro</h4>

      <div class="form-group">
        <label>Método de Pago</label>
        <select [(ngModel)]="price.paymentID" name="paymentID" required class="neon-select">
          <option [ngValue]="0" disabled>Selecciona un método de pago</option>
          @for (payment of availablePayments; track payment.id) {
            <option [ngValue]="payment.id" class="notranslate" translate="no">{{ payment.name }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Precio Regular</label>
        <input type="text" inputmode="decimal" [(ngModel)]="regularPriceInput" (blur)="normalizeRegularPriceInput()" name="price" required placeholder="Ej: 9,99 o 9.99" class="neon-input">
      </div>

      <div class="form-check" style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="promotionCheck" [(ngModel)]="price.promotion" name="promotion" class="neon-checkbox">
        <label for="promotionCheck" style="margin: 0; cursor: pointer;">¿Tiene Promoción?</label>
      </div>

      @if(price.promotion) {
        <div class="form-group">
          <label>Precio de Promoción</label>
          <input type="text" inputmode="decimal" [(ngModel)]="promotionPriceInput" (blur)="normalizePromotionPriceInput()" name="promotionPrice" required placeholder="Ej: 7,99 o 7.99" class="neon-input">
        </div>
      }

      <div class="modal-footer">
        <button type="button" class="btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn-neon-action">
          <span class="material-icons notranslate" translate="no">save</span> Guardar Precio
        </button>
      </div>
    </form>
  </div>
</div>
