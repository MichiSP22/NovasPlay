<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ countryToEdit ? 'Editar' : 'Nuevo' }} Pais</h3>
      <button class="close-btn" (click)="closeModal()">
        <span class="material-icons notranslate" translate="no">close</span>
      </button>
    </div>

    <form (ngSubmit)="saveCountry()" class="neon-form">
      <div class="form-group">
        <label for="name">Nombre del Pais</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="country.name"
          name="name"
          required
          placeholder="Ej: Venezuela"
          class="neon-input">
      </div>

      <div class="form-group">
        <label for="isoCode">Codigo ISO</label>
        <input
          id="isoCode"
          type="text"
          [(ngModel)]="country.isoCode"
          name="isoCode"
          required
          placeholder="Ej: VE"
          class="neon-input">
      </div>

      <div class="form-group">
        <label for="image">Imagen / Bandera del Pais</label>
        <input
          id="image"
          type="file"
          (change)="onFileSelected($event)"
          accept="image/*"
          class="neon-input"
          [required]="!country.id">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn-neon-action">
          <span class="material-icons notranslate" translate="no">save</span>
          Guardar Pais
        </button>
      </div>
    </form>
  </div>
</div>
