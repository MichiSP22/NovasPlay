<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>{{ rechargeToEdit ? 'Editar' : 'Nueva' }} Recarga</h3>
      <button class="close-btn" (click)="closeModal()">
        <span class="material-icons notranslate" translate="no">close</span>
      </button>
    </div>

    <form (ngSubmit)="saveRecharge()" class="neon-form">
      
      <div class="form-group">
        <label>Producto Asociado</label>
        <select [(ngModel)]="recharge.productID" name="productID" required class="neon-input">
          <option [ngValue]="0" disabled>Selecciona un producto</option>
          @for (prod of availableProducts; track prod.id) {
            <option [ngValue]="prod.id">{{ prod.name }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Nombre de la Recarga</label>
        <input type="text" [(ngModel)]="recharge.name" name="name" required placeholder="Ej: 100 Diamantes" class="neon-input">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="recharge.description" name="description" required class="neon-input" style="min-height: 80px;"></textarea>
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" [(ngModel)]="recharge.soldOut" name="soldOut" id="soldOutRecharge" style="width: 20px; height: 20px;">
        <label for="soldOutRecharge" style="margin-bottom: 0; color: #ff4d4d;">¿Agotada?</label>
      </div>

      <div class="form-group">
        <label>Imagen Principal</label>
        <input type="file" (change)="onImageSelected($event)" accept="image/*" class="neon-input" [required]="!recharge.id"> 
      </div>

      <div class="form-group">
        <label>Ícono</label>
        <input type="file" (change)="onIconSelected($event)" accept="image/*" class="neon-input" [required]="!recharge.id">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn-neon-action">
          <span class="material-icons notranslate" translate="no">save</span> Guardar Recarga
        </button>
      </div>
    </form>
  </div>
</div>
